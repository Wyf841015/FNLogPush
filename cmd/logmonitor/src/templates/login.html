<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 日志哨兵</title>
    <script>
    // 统一的Fetch请求函数 - 确保session cookie正确传递
    async function apiFetch(url, options = {}) {
        const defaultOptions = {
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' }
        };
        const mergedOptions = { ...defaultOptions, ...options };
        const response = await fetch(url, mergedOptions);
        
        // 检查session是否过期（仅对已登录用户有效）
        if (response.status === 401 || response.status === 403) {
            // 如果在登录页则不跳转，避免循环
            if (!window.location.pathname.includes('/login')) {
                window.location.href = '/login';
            }
            throw new Error('Session expired');
        }
        return response;
    }
    </script>
    <!-- Bootstrap 5 CSS (本地) -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <!-- Font Awesome (本地) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
    <!-- 主题样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            padding: 20px;
        }

        .login-container {
            background: var(--glass-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header i {
            font-size: 3.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating > label {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            background-color: var(--input-bg);
            color: var(--input-color);
        }

        .form-control:focus {
            border-color: var(--input-border-focus);
            box-shadow: var(--input-shadow-focus);
        }

        .form-control::placeholder {
            color: var(--input-placeholder);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 14px 18px;
            font-weight: 500;
        }

        .alert-danger {
            background: var(--color-danger-glow);
            color: var(--color-danger);
            border-left: 4px solid var(--color-danger);
        }

        .alert-success {
            background: var(--color-success-glow);
            color: var(--color-success);
            border-left: 4px solid var(--color-success);
        }

        .alert-warning {
            background: var(--color-warning-glow);
            color: var(--color-warning);
            border-left: 4px solid var(--color-warning);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.15);
            color: #1d4ed8;
            border-left: 4px solid #3b82f6;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .footer a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            color: var(--color-accent);
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeIn 0.6s ease-out;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 35px 25px;
                border-radius: 20px;
            }

            .login-header i {
                font-size: 2.8rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }

        /* ================================================================
           主题背景适配：覆盖 body 背景为各主题的渐变色
           默认(暗夜紫) / dark(深色) / ocean(深海蓝) 使用 --dark-gradient
           green(清新绿) / sunset(暮色橙) 各自使用对应的深色渐变
           ================================================================ */
        body {
            background: var(--dark-gradient) !important;
        }

        /* 深色系主题：直接使用各自的 --dark-gradient，变量已在 main.css 中定义 */
        body.theme-dark,
        body.theme-ocean {
            background: var(--dark-gradient) !important;
        }

        /* 清新绿主题：使用深绿渐变背景，卡片保持白色 */
        body.theme-green {
            background: var(--dark-gradient) !important;
        }

        /* 暮色橙主题：使用深橙渐变背景，卡片保持白色 */
        body.theme-sunset {
            background: var(--dark-gradient) !important;
        }

        /* 亮色系主题（green / sunset）登录卡片文字适配：
           --dark-gradient 背景偏深，但卡片用 --glass-bg（白色半透明），
           内部文字颜色已由各主题 CSS 变量正确定义，无需额外覆盖 */
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h1 id="page-title">系统登录</h1>
            <p id="page-subtitle">请输入您的登录凭证</p>
        </div>

        <div id="alert-container"></div>

        <form id="login-form" onsubmit="handleSubmit(event)">
            <div class="form-floating">
                <input type="text" class="form-control" id="username" placeholder="用户名" required>
                <label for="username"><i class="fas fa-user me-2"></i>用户名</label>
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="password" placeholder="密码" required>
                <label for="password"><i class="fas fa-lock me-2"></i>密码</label>
            </div>

            <div id="confirm-password-container" style="display: none;" class="form-floating mb-3">
                <input type="password" class="form-control" id="confirm-password" placeholder="确认密码">
                <label for="confirm-password"><i class="fas fa-lock me-2"></i>确认密码</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="submit-btn">
                <i class="fas fa-sign-in-alt me-2"></i><span id="submit-text">登录</span>
            </button>
        </form>

        <div class="footer">
            <a href="#" id="change-password-link" style="display: none;" onclick="handleChangePassword()">
                <i class="fas fa-key me-1"></i>修改密码
            </a>
        </div>
    </div>

    <!-- Bootstrap 5 JS (本地) -->
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        let mode = 'login'; // 'login' 或 'setup' 或 'change-password'
        let username = '';

        // 页面加载时检查是否需要初始设置
        document.addEventListener('DOMContentLoaded', function() {
            applyTheme(); // 应用主题
            checkSetup();
        });

        // 应用主题
        function applyTheme() {
            fetch('/api/config/theme', {credentials: 'same-origin'})
                .then(response => response.json())
                .then(data => {
                    const theme = data.theme || 'default';
                    document.body.className = 'theme-' + theme;
                })
                .catch(error => {
                    console.log('无法加载主题配置，使用默认主题');
                    document.body.className = 'theme-default';
                });
        }

        async function checkSetup() {
            try {
                const response = await fetch('/api/auth/check-setup', {credentials: 'same-origin'});
                const data = await response.json();

                if (data.need_setup) {
                    // 首次运行，显示设置页面
                    mode = 'setup';
                    document.getElementById('page-title').textContent = '初始设置';
                    document.getElementById('page-subtitle').textContent = '请设置管理员账号和密码';
                    document.getElementById('submit-text').textContent = '完成设置';
                    document.getElementById('confirm-password-container').style.display = 'block';
                    document.getElementById('confirm-password').required = true;
                } else {
                    // 已设置用户，显示登录页面
                    mode = 'login';
                    username = data.username;
                    document.getElementById('change-password-link').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('检查设置状态失败:', error);
                showAlert('检查系统状态失败，请刷新页面', 'danger');
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');
            const submitText = document.getElementById('submit-text');

            // 清除之前的提示
            document.getElementById('alert-container').innerHTML = '';

            // 验证输入
            if (mode === 'setup') {
                if (!confirmPassword) {
                    showAlert('请确认密码', 'danger');
                    return;
                }
                if (password !== confirmPassword) {
                    showAlert('两次输入的密码不一致', 'danger');
                    return;
                }
            }

            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitText.textContent = '处理中...';

            try {
                let response, data;

                if (mode === 'setup') {
                    // 初始设置
                    response = await fetch('/api/auth/setup', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: usernameInput,
                            password: password
                        })
                    });
                } else if (mode === 'change-password') {
                    // 修改密码
                    response = await fetch('/api/auth/change-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            old_password: password,
                            new_password: confirmPassword
                        })
                    });
                } else {
                    // 登录 - 使用apiFetch确保session cookie正确传递
                    response = await apiFetch('/api/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({
                            username: usernameInput,
                            password: password
                        })
                    });
                }

                data = await response.json();

                if (data.success) {
                    showAlert(data.message || '操作成功', 'success');

                    if (mode === 'setup' || mode === 'login') {
                        // 登录成功，先验证session再跳转
                        setTimeout(async () => {
                            try {
                                const sessionCheck = await apiFetch('/api/auth/check-session');
                                const sessionData = await sessionCheck.json();
                                if (sessionData.logged_in) {
                                    // Session有效，跳转到主页并强制刷新
                                    window.location.href = '/';
                                } else {
                                    showAlert('登录验证失败，请重试', 'danger');
                                }
                            } catch (e) {
                                window.location.href = '/';
                            }
                        }, 500);
                    } else if (mode === 'change-password') {
                        // 修改密码成功，返回登录页面
                        setTimeout(() => {
                            resetToLogin();
                        }, 1000);
                    }
                } else {
                    showAlert(data.error || '操作失败', 'danger');
                }
            } catch (error) {
                console.error('请求失败:', error);
                showAlert('网络错误，请稍后重试', 'danger');
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                submitText.textContent = mode === 'setup' ? '完成设置' : '登录';
            }
        }

        function handleChangePassword() {
            // 切换到修改密码模式
            event.preventDefault();

            mode = 'change-password';
            document.getElementById('page-title').textContent = '修改密码';
            document.getElementById('page-subtitle').textContent = '请验证旧密码并设置新密码';
            document.getElementById('submit-text').textContent = '修改密码';
            document.getElementById('username').value = username;
            document.getElementById('username').readOnly = true;
            document.getElementById('username-label').innerHTML = '<i class="fas fa-user me-2"></i>用户名（只读）';
            document.getElementById('password').placeholder = '旧密码';
            document.getElementById('confirm-password-container').style.display = 'block';
            document.getElementById('confirm-password').placeholder = '新密码';
            document.getElementById('confirm-password').required = true;
            document.getElementById('change-password-link').style.display = 'none';

            // 清除之前的提示
            document.getElementById('alert-container').innerHTML = '';
        }

        function resetToLogin() {
            // 重置到登录模式
            mode = 'login';
            document.getElementById('page-title').textContent = '系统登录';
            document.getElementById('page-subtitle').textContent = '请输入您的登录凭证';
            document.getElementById('submit-text').textContent = '登录';
            document.getElementById('username').value = '';
            document.getElementById('username').readOnly = false;
            document.getElementById('username-label').innerHTML = '<i class="fas fa-user me-2"></i>用户名';
            document.getElementById('password').placeholder = '密码';
            document.getElementById('password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('confirm-password-container').style.display = 'none';
            document.getElementById('confirm-password').required = false;
            document.getElementById('change-password-link').style.display = 'inline-block';

            // 清除之前的提示
            document.getElementById('alert-container').innerHTML = '';
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            const alertHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>
                    ${message}
                </div>
            `;
            alertContainer.innerHTML = alertHTML;

            // 3秒后自动消失
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => alert.remove(), 300);
                }
            }, 5000);
        }
    </script>
</body>
</html>
